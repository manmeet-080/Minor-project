services:
  postgres:
    image: postgres:16-alpine
    container_name: campusphere-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: campusphere
      POSTGRES_PASSWORD: campusphere_dev_password
      POSTGRES_DB: campusphere
    volumes:
      - campusphere_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: campusphere-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - campusphere_redis:/data

volumes:
  campusphere_pgdata:
  campusphere_redis:
