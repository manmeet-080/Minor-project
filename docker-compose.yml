services:
  postgres:
    image: postgres:16-alpine
    container_name: shms-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: shms
      POSTGRES_PASSWORD: shms_dev_password
      POSTGRES_DB: shms
    volumes:
      - shms_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: shms-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - shms_redis:/data

volumes:
  shms_pgdata:
  shms_redis:
